<!-- Scroll to Top Button -->
<button id="scroll-to-top" aria-label="Scroll to top">&#8963;</button>

<style>
#scroll-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 3rem;
  height: 3rem;
  border: none;
  border-radius: 50%;
  background: #6f777d;
  color: #fff;
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s, background 0.3s;
  z-index: 9999;
}

#scroll-to-top.visible {
  opacity: 0.7;
  visibility: visible;
}

#scroll-to-top:hover {
  opacity: 1;
  background: #494e52;
}
</style>

<script>
(function () {
  var btn = document.getElementById("scroll-to-top");

  window.addEventListener("scroll", function () {
    if (window.scrollY > 400) {
      btn.classList.add("visible");
    } else {
      btn.classList.remove("visible");
    }
  });

  btn.addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
